# GPS to MQTT — settings.toml
#
# All values shown here are the built-in defaults.
# Only override what you need to change.
#
# Environment variables (highest priority):
#   GPS_TO_MQTT_CONNECTION_TYPE, GPS_TO_MQTT_PORT_NAME, GPS_TO_MQTT_BAUD_RATE,
#   GPS_TO_MQTT_TCP_HOST, GPS_TO_MQTT_TCP_PORT, GPS_TO_MQTT_MQTT_HOST, …

# ---------------------------------------------------------------------------
# Connection type
# ---------------------------------------------------------------------------
# Choose how to receive GPS data:
#   serial  — directly attached USB/UART GPS device (default)
#   tcp     — network bridge, e.g. https://github.com/askrejans/io-to-net
connection_type = "serial"

# ---------------------------------------------------------------------------
# Serial port  (used when connection_type = "serial")
# ---------------------------------------------------------------------------
port_name = "/dev/ttyACM0"
baud_rate  = 9600
set_gps_to_10hz = false

# ---------------------------------------------------------------------------
# TCP bridge   (used when connection_type = "tcp")
# ---------------------------------------------------------------------------
# Point these at an io-to-net instance forwarding the GPS serial port.
# Example io-to-net bridge config (gps bridge listening on port 9001):
#
#   [[bridges]]
#   name = "gps"
#   frame_mode = "line"
#
#   [bridges.source]
#   type  = "serial"
#   port  = "/dev/ttyUSB0"
#   baud  = 9600
#
#   [bridges.transport]
#   type   = "tcp"
#   listen = "[::]:9001"
#
# tcp_host = "192.168.1.10"
# tcp_port = 9001

# ---------------------------------------------------------------------------
# MQTT
# ---------------------------------------------------------------------------
mqtt_enabled = true                 # set to false for display-only / no MQTT
mqtt_host    = "localhost"
mqtt_port    = 1883
# mqtt_client_id = "gps-to-mqtt"   # auto-generated when absent
mqtt_base_topic = "/GOLF86/GPS"
mqtt_reconnect_max_attempts = 0     # 0 = infinite retries

# Optional authentication
# mqtt_username = ""
# mqtt_password = ""
# mqtt_use_tls  = false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_level = "info"   # trace | debug | info | warn | error
log_json  = false     # true = JSON structured logs (useful for log aggregators)

# ---------------------------------------------------------------------------
# TUI
# ---------------------------------------------------------------------------
tui_refresh_rate_ms  = 100
max_log_buffer_size  = 1000

# ---------------------------------------------------------------------------
# Telemetry
# ---------------------------------------------------------------------------
telemetry_enabled          = true
telemetry_smoothing_window = 3

# ---------------------------------------------------------------------------
# Prometheus metrics
# ---------------------------------------------------------------------------
prometheus_enabled = false        # set to true to expose /metrics and /health
prometheus_port    = 9090
prometheus_bind    = "0.0.0.0"   # use "127.0.0.1" to restrict to localhost

# ---------------------------------------------------------------------------
# Track / lap timing
# ---------------------------------------------------------------------------
track_mode = "disabled"   # disabled | manual | learn | gpx
# track_start_lat      = 40.7128
# track_start_lon      = -74.0060
track_geofence_radius = 15.0
# track_gpx_file = "/path/to/track.gpx"
